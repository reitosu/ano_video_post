name: Secret Scan (Gitleaks)

# Gitleaks はオープンソースのシークレット検出ツールです。
# パブリックリポジトリでは API キー・admin 権限なしで動作します。
# GITHUB_TOKEN は GitHub Actions が自動的に提供するため、追加設定不要です。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # コミット履歴全体をスキャンするために必要

      - name: Gitleaks でシークレットをスキャン
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # パブリックリポジトリは GITLEAKS_LICENSE 不要
          # プライベートリポジトリに移行する場合は以下を追加:
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
